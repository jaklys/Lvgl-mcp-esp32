name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - uses: ilammy/msvc-dev-cmd@v1

      # Build simulator
      - name: Build simulator
        run: |
          cmake -S simulator -B simulator/build -G Ninja -DCMAKE_C_COMPILER=cl
          cmake --build simulator/build --config Release

      # Smoke test simulator
      - name: Smoke test simulator
        run: |
          simulator\build\lvgl_sim.exe --output-png simulator\build\test.png --output-json simulator\build\test.json
          if (!(Test-Path simulator\build\test.png)) { throw "PNG not generated" }
          Write-Host "Simulator OK"

      # Build MCP server
      - name: Build MCP server
        working-directory: mcp-server
        run: |
          npm ci
          npx tsc

      # Integration test
      - name: Integration test
        working-directory: mcp-server
        run: |
          $init = '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.1"}}}'
          $result = $init | node dist/index.js 2>$null
          if ($result -match '"lvgl-simulator"') {
            Write-Host "MCP server OK"
          } else {
            throw "MCP server did not respond correctly"
          }

      # Package release archive
      - name: Package release
        run: |
          New-Item -ItemType Directory -Force -Path release\simulator
          New-Item -ItemType Directory -Force -Path release\mcp-server

          # Full simulator directory (source + build artifacts for incremental compilation)
          Copy-Item simulator\CMakeLists.txt release\simulator\
          Copy-Item simulator\lv_conf.h release\simulator\
          Copy-Item simulator\main.c release\simulator\
          Copy-Item simulator\hal\ release\simulator\hal\ -Recurse
          Copy-Item simulator\export\ release\simulator\export\ -Recurse
          Copy-Item simulator\templates\ release\simulator\templates\ -Recurse
          Copy-Item simulator\lib\ release\simulator\lib\ -Recurse

          # Build artifacts (prebuilt LVGL lib + exe + CMake cache)
          Copy-Item simulator\build\ release\simulator\build\ -Recurse
          # Remove test outputs from build dir
          Remove-Item release\simulator\build\test.png -ErrorAction SilentlyContinue
          Remove-Item release\simulator\build\test.json -ErrorAction SilentlyContinue

          # MCP server (dist + deps)
          Copy-Item mcp-server\dist\ release\mcp-server\dist\ -Recurse
          Copy-Item mcp-server\bin\ release\mcp-server\bin\ -Recurse
          Copy-Item mcp-server\package.json release\mcp-server\
          Copy-Item mcp-server\package-lock.json release\mcp-server\

          # Install production deps only
          Push-Location release\mcp-server
          npm ci --omit=dev
          Pop-Location

          # Config example
          @"
          {
            "mcpServers": {
              "lvgl-simulator": {
                "command": "npx",
                "args": ["lvgl-mcp-server"]
              }
            }
          }
          "@ | Out-File -Encoding utf8 release\claude-config-example.json

          # Zip it
          Compress-Archive -Path release\* -DestinationPath lvgl-mcp-esp32-windows-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-mcp-esp32-windows-x64
          path: lvgl-mcp-esp32-windows-x64.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lvgl-mcp-esp32-windows-x64

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          cat <<'NOTES' > release-notes.md
          ## LVGL MCP Server for ESP32

          Headless LVGL simulator with MCP integration for visual UI development feedback.

          ### Install via npm (recommended)

          ```
          npm install -g lvgl-mcp-server
          ```

          Then add to `.claude/settings.json`:
          ```json
          {
            "mcpServers": {
              "lvgl-simulator": {
                "command": "npx",
                "args": ["lvgl-mcp-server"]
              }
            }
          }
          ```

          The simulator binary is downloaded automatically on install.

          ### Manual install (from zip)
          1. Extract the archive
          2. `cd mcp-server && npm ci --omit=dev`
          3. Add to Claude Code config with full paths to `mcp-server/dist/index.js`

          ### What's included
          - `simulator/` — Full LVGL 9.2 headless renderer (source + prebuilt, Windows x64 MSVC)
          - `mcp-server/` — Node.js MCP server (stdio transport)

          ### Requirements
          - Windows 10/11 x64
          - Node.js 18+
          - Visual Studio Build Tools 2019+ (for incremental compilation)
          NOTES

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          files: lvgl-mcp-esp32-windows-x64.zip
          draft: false
          prerelease: false
